# Configuration for running tau2-bench with local vLLM and entropy collection.
#
# This config is used by the centroid framework wrapper scripts.
# For direct tau2 CLI usage, pass equivalent --flags directly.
#
# Usage:
#   python -m tau2.cli run --domain airline --num-tasks 1 --num-trials 1 \
#     --local-vllm --agent-llm Qwen/Qwen3-14B --user-llm Qwen/Qwen3-14B \
#     --gpu-ids 4,5,6,7 --tensor-parallel-size 4 \
#     --entropy-output-dir outputs/tau2_bench_qwen3_14b

model:
  name_or_path: "Qwen/Qwen3-14B"

vllm:
  port: 8000
  gpu_ids: [0, 1, 2, 3, 4, 5, 6, 7]
  tensor_parallel_size: 8
  gpu_memory_utilization: 0.9
  max_model_len: 32768
  tool_call_parser: "hermes"  # null for prompt-based (DeepSeek-R1-Distill)

tau2:
  domain: "airline"
  task_split: "base"
  num_trials: 1
  num_tasks: null  # null = run all tasks
  max_steps: 200
  agent: "llm_agent"
  user: "user_simulator"
  agent_temperature: 0.0
  user_temperature: 0.0

entropy:
  top_logprobs: 20

output:
  dir: "outputs/tau2_bench"

# Model-specific configurations:
#
# Qwen3-14B:
#   tool_call_parser: "hermes"
#   prompt_tool_calling: false
#
# QwQ-32B:
#   tool_call_parser: "hermes"
#   prompt_tool_calling: false
#
# Ministral-3-14B:
#   tool_call_parser: "mistral"
#   prompt_tool_calling: false
#
# OLMo-3.1-32B-Instruct / Think:
#   tool_call_parser: "olmo3"
#   prompt_tool_calling: false
#
# DeepSeek-R1-Distill-Qwen-32B:
#   tool_call_parser: null
#   prompt_tool_calling: true
#
# gpt-oss-120b:
#   tool_call_parser: "openai"
#   prompt_tool_calling: false
